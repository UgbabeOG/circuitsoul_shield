<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Evidence Request | Guardian Lens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface": "#f4faff", "on-surface": "#111d23", "surface-container-highest": "#d7e4ec", "on-secondary-container": "#217128", "tertiary-container": "#9d0010", "outline": "#737783", "tertiary-fixed": "#ffdad6", "primary-fixed": "#d9e2ff", "outline-variant": "#c3c6d4", "surface-container-low": "#e9f6fd", "tertiary": "#720009", "secondary-container": "#a0f399", "surface-container-lowest": "#ffffff", "surface-container": "#e3f0f8", "on-primary-container": "#a1bbff", "surface-container-high": "#ddeaf2", "primary-container": "#0d47a1", "surface-tint": "#2b5bb5", "error": "#ba1a1a", "error-container": "#ffdad6", "secondary": "#1b6d24", "on-error-container": "#93000a", "primary": "#003178", "on-primary": "#ffffff" }, fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }, borderRadius: {"DEFAULT": "0.125rem", "md": "0.375rem", "lg": "0.5rem", "full": "9999px"} } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
        .glass-float { background: rgba(215, 228, 236, 0.6); backdrop-filter: blur(20px); }
        .gradient-cta { background: linear-gradient(135deg, #003178, #0d47a1); }
        .gradient-cta:hover { opacity: 0.95; box-shadow: 0 4px 12px rgba(0, 49, 120, 0.2); }
    </style>
</head>
<body class="bg-surface-container text-on-surface antialiased min-h-screen flex items-center justify-center p-8">

    <div class="bg-surface-container-lowest rounded-xl shadow-2xl overflow-hidden w-full max-w-2xl flex flex-col border border-outline-variant/15">
        <header class="bg-surface border-b border-outline-variant/15 flex items-center justify-between p-6">
            <div class="flex items-center gap-4">
                <a href="../admin_evidence_review_workspace/code.html" class="w-10 h-10 rounded-full hover:bg-surface-container-highest transition-colors flex items-center justify-center text-outline"><span class="material-symbols-outlined">close</span></a>
                <h2 class="font-headline font-extrabold text-2xl text-on-surface">New Evidence Request</h2>
            </div>
            <span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest">Internal Form</span>
        </header>

        <div class="flex-1 p-10 bg-surface space-y-8">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Request Title *</label>
                <input type="text" placeholder="e.g., Updated VPN Access Policy Document" class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-3 text-sm font-bold focus:outline-none focus:border-primary/50 text-on-surface placeholder-outline/50"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Framework</label>
                    <select class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-3 text-sm font-bold text-on-surface focus:outline-none focus:border-primary/50">
                        <option>SOC 2 Type II</option><option>ISO 27001</option><option>HIPAA</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Control ID</label>
                    <select class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-3 text-sm font-bold text-on-surface focus:outline-none focus:border-primary/50">
                        <option>CC6.1 — Logical Access</option><option>CC7.2 — System Monitoring</option><option>CC8.1 — Change Management</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Assign To *</label>
                <div class="flex items-center gap-3">
                    <div class="flex -space-x-2">
                        <div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center text-[10px] font-bold border-2 border-surface">AK</div>
                        <div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface flex items-center justify-center text-[10px] font-bold border-2 border-surface">ES</div>
                    </div>
                    <input type="text" placeholder="Search team members..." class="flex-1 bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:border-primary/50 text-on-surface placeholder-outline/50"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Priority</label>
                    <div class="flex gap-2">
                        <label class="cursor-pointer flex-1">
                            <input type="radio" name="priority" class="sr-only peer" checked/>
                            <div class="p-3 rounded-md border-2 border-error bg-error/5 peer-checked:border-error peer-checked:bg-error/10 text-center text-xs font-bold text-error uppercase tracking-wider transition-all">Critical</div>
                        </label>
                        <label class="cursor-pointer flex-1">
                            <input type="radio" name="priority" class="sr-only peer"/>
                            <div class="p-3 rounded-md border-2 border-outline-variant/15 text-center text-xs font-bold text-outline uppercase tracking-wider hover:border-tertiary-container transition-all">High</div>
                        </label>
                        <label class="cursor-pointer flex-1">
                            <input type="radio" name="priority" class="sr-only peer"/>
                            <div class="p-3 rounded-md border-2 border-outline-variant/15 text-center text-xs font-bold text-outline uppercase tracking-wider hover:border-primary transition-all">Normal</div>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Due Date</label>
                    <input type="date" value="2023-11-15" class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-3 text-sm font-bold text-on-surface focus:outline-none focus:border-primary/50"/>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-outline block mb-2">Description & Requirements</label>
                <textarea rows="4" placeholder="Describe what evidence is needed, acceptable formats, and any specific instructions..." class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-md px-4 py-3 text-sm focus:outline-none focus:border-primary/50 text-on-surface placeholder-outline/50 resize-none"></textarea>
            </div>

            <div class="bg-surface-container-low p-4 rounded-md flex items-center gap-4">
                <span class="material-symbols-outlined text-primary">info</span>
                <p class="text-xs text-outline font-medium">The assignee will be notified via email and Slack. They will have <b class="text-on-surface">upload access</b> to this request only.</p>
            </div>
        </div>

        <footer class="bg-surface border-t border-outline-variant/15 p-6 flex justify-between items-center">
            <button class="px-6 py-3 rounded-md text-sm font-bold text-outline hover:text-on-surface transition-colors">Cancel</button>
            <button class="gradient-cta text-on-primary px-8 py-3 rounded-md text-sm font-headline font-extrabold tracking-wide flex items-center gap-2 shadow-lg transition-transform hover:-translate-y-0.5">
                Send Request <span class="material-symbols-outlined text-sm">send</span>
            </button>
        </footer>
    </div>
</body>
</html>
